name: Playground Selenium Tests

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: "Target environment"
        required: true
        default: "dev"
        options:
          - "dev"
          - "qa"
          - "test"
          - "main"
  schedule:
    - cron: "0 6 * * *"

jobs:
  selenium-run:
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event.inputs.env || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setting up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xclip
      - name: Installing all necessary packages
        run: pip install -r  packages/playground/tests/frontend_selenium/requirements.txt
      - name: Node install
        uses: actions/setup-node@v4
        with:
          node-version: 22.15
      - name: Yarn install
        run: yarn install
      - name: Set environment
        run: sed -i "s/^net = .*/net = $ENV/" packages/playground/tests/frontend_selenium/Config.ini
      - name: Display test target
        run: |
          if [ "$ENV" = "dev" ]; then
            echo "Running against locally built dashboard"
          else
            echo "Running against URLs defined for '$ENV' network"
          fi
      - name: Lerna Build
        if: ${{ env.ENV == 'dev' }}
        run: yarn lerna run build
      - name: Yarn Serve
        if: ${{ env.ENV == 'dev' }}
        run: make run project=playground &
      - name: Wait for localhost
        if: ${{ env.ENV == 'dev' }}
        run: sleep 60
      - name: Run tests
        working-directory: ./packages/playground/tests/frontend_selenium
        env:
          TFCHAIN_MNEMONICS: ${{ secrets.TFCHAIN_MNEMONICS }}
          TFCHAIN_NODE_MNEMONICS: ${{ secrets.TFCHAIN_NODE_MNEMONICS }}
          STELLAR_ADDRESS: ${{ secrets.STELLAR_ADDRESS }}
          EMAIL: ${{ secrets.EMAIL }}
        run: python -m pytest -v --html=report.html
      - name: Upload test report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report-${{ env.ENV }}
          path: packages/playground/tests/frontend_selenium/report.html
